
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  #screen { text-align: center; padding: 2rem; }
  #screen h1 { font-size: 22px; margin-bottom: 8px; }
  #screen p { color: #555; margin-bottom: 16px; }
  input { padding: 8px 12px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; width: 200px; margin-bottom: 10px; display: block; margin: 0 auto 12px; }
  button { padding: 8px 20px; font-size: 15px; background: #1a6fc4; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  button:hover { background: #155aa0; }
  #game { display: none; text-align: center; }
  #info { font-size: 15px; margin: 8px 0; color: #333; }
  canvas { display: block; margin: 0 auto; border: 2px solid #333; }
  #dpad { display: grid; grid-template-columns: repeat(3, 44px); gap: 4px; margin: 10px auto; width: 136px; }
  #dpad button { width: 44px; height: 44px; font-size: 18px; background: #fff; color: #333; border: 1px solid #aaa; border-radius: 6px; }
  .empty { background: none !important; border: none !important; pointer-events: none; }
  #win { display: none; text-align: center; padding: 2rem; }
  #win h1 { font-size: 22px; margin-bottom: 8px; }
  #win p { color: #555; margin-bottom: 6px; }
  #win .t { font-size: 36px; font-weight: bold; margin: 8px 0 16px; }
</style>
</head>
<body>

<div id="screen">
  <h1>Encontre o farol 🏠</h1>
  <p>Guie o barco pelo labirinto até o farol!</p>
  <input type="text" id="nome" placeholder="Seu nome" maxlength="20" />
  <button onclick="iniciar()">Jogar</button>
</div>

<div id="game">
  <div id="info">Jogador: <b id="jn"></b> &nbsp;|&nbsp; Tempo: <b id="tm">0s</b></div>
  <canvas id="c" width="360" height="360"></canvas>
  <div id="dpad">
    <div class="empty"></div><button onclick="mv(0,-1)">↑</button><div class="empty"></div>
    <button onclick="mv(-1,0)">←</button><div class="empty"></div><button onclick="mv(1,0)">→</button>
    <div class="empty"></div><button onclick="mv(0,1)">↓</button><div class="empty"></div>
  </div>
</div>

<div id="win">
  <h1>🏆 Chegou ao farol!</h1>
  <p id="wn"></p>
  <div class="t" id="wt"></div>
  <button onclick="reiniciar()">Jogar de novo</button>
</div>

<script>
var COLS=12,ROWS=12,W=360/COLS,H=360/ROWS;
var grid,px,py,nome,seg,timer,fim;

function cell(c,r){return grid[r*COLS+c];}

function gerar(){
  grid=[];
  for(var i=0;i<COLS*ROWS;i++) grid.push({c:i%COLS,r:Math.floor(i/COLS),N:true,S:true,E:true,W:true,v:false});
  var stack=[grid[0]]; grid[0].v=true;
  var dirs=[{d:'N',dc:0,dr:-1,o:'S'},{d:'S',dc:0,dr:1,o:'N'},{d:'E',dc:1,dr:0,o:'W'},{d:'W',dc:-1,dr:0,o:'E'}];
  while(stack.length){
    var cur=stack[stack.length-1];
    var nb=dirs.filter(function(x){
      var nc=cur.c+x.dc,nr=cur.r+x.dr;
      return nc>=0&&nc<COLS&&nr>=0&&nr<ROWS&&!cell(nc,nr).v;
    });
    if(!nb.length){stack.pop();continue;}
    var d=nb[Math.floor(Math.random()*nb.length)];
    var nx=cell(cur.c+d.dc,cur.r+d.dr);
    cur[d.d]=false;nx[d.o]=false;nx.v=true;stack.push(nx);
  }
  px=0;py=0;fim=false;
}

function fmt(s){var m=Math.floor(s/60);return m>0?m+'m '+s%60+'s':s+'s';}

function iniciar(){
  nome=document.getElementById('nome').value.trim();
  if(!nome){alert('Digite seu nome!');return;}
  document.getElementById('screen').style.display='none';
  document.getElementById('win').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('jn').textContent=nome;
  gerar();desenhar();
  seg=0;clearInterval(timer);
  timer=setInterval(function(){if(!fim){seg++;document.getElementById('tm').textContent=fmt(seg);}},1000);
}

function reiniciar(){
  document.getElementById('win').style.display='none';
  document.getElementById('screen').style.display='block';
  document.getElementById('nome').value='';
  clearInterval(timer);
}

function mv(dc,dr){
  if(fim)return;
  var cur=cell(px,py);
  var dm={};dm['0,-1']='N';dm['0,1']='S';dm['1,0']='E';dm['-1,0']='W';
  var w=dm[dc+','+dr];
  if(!w||cur[w])return;
  px+=dc;py+=dr;
  if(px===COLS-1&&py===ROWS-1){
    fim=true;clearInterval(timer);
    desenhar();
    setTimeout(function(){
      document.getElementById('game').style.display='none';
      document.getElementById('win').style.display='block';
      document.getElementById('wn').textContent=nome;
      document.getElementById('wt').textContent=fmt(seg);
    },300);
  } else desenhar();
}

function desenhar(){
  var cv=document.getElementById('c');
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#c8e6f5';
  ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#1a3a6a';ctx.lineWidth=2;
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
    var cl=cell(c,r),x=c*W,y=r*H;
    ctx.beginPath();
    if(cl.N){ctx.moveTo(x,y);ctx.lineTo(x+W,y);}
    if(cl.S){ctx.moveTo(x,y+H);ctx.lineTo(x+W,y+H);}
    if(cl.E){ctx.moveTo(x+W,y);ctx.lineTo(x+W,y+H);}
    if(cl.W){ctx.moveTo(x,y);ctx.lineTo(x,y+H);}
    ctx.stroke();
  }
  var lx=(COLS-1)*W,ly=(ROWS-1)*H;
  ctx.fillStyle='#e74c3c';ctx.fillRect(lx+W*0.3,ly+H*0.1,W*0.4,H*0.6);
  ctx.fillStyle='#f1c40f';ctx.beginPath();ctx.arc(lx+W/2,ly+H*0.18,W*0.14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c0392b';
  ctx.beginPath();ctx.moveTo(lx+W*0.2,ly+H);ctx.lineTo(lx+W*0.8,ly+H);ctx.lineTo(lx+W*0.7,ly+H*0.7);ctx.lineTo(lx+W*0.3,ly+H*0.7);ctx.closePath();ctx.fill();
  var bx=px*W,by=py*H,cx2=bx+W/2;
  ctx.fillStyle='#2980b9';
  ctx.beginPath();ctx.moveTo(cx2-W*0.3,by+H*0.5);ctx.lineTo(cx2+W*0.3,by+H*0.5);ctx.lineTo(cx2+W*0.2,by+H*0.75);ctx.lineTo(cx2-W*0.2,by+H*0.75);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ecf0f1';
  ctx.beginPath();ctx.moveTo(cx2,by+H*0.2);ctx.lineTo(cx2,by+H*0.5);ctx.lineTo(cx2+W*0.25,by+H*0.38);ctx.closePath();ctx.fill();
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowUp'){e.preventDefault();mv(0,-1);}
  else if(e.key==='ArrowDown'){e.preventDefault();mv(0,1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();mv(-1,0);}
  else if(e.key==='ArrowRight'){e.preventDefault();mv(1,0);}
});
</script>
</body>
</html>
